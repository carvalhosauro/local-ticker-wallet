name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
version-template: '$RESOLVED_VERSION'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-case: sentence

categories:
  - title: '🚀 Features'
    labels: [feature, enhancement]
  - title: '🐛 Bug Fixes'
    labels: [fix, bug]
  - title: '📚 Documentation'
    labels: [documentation, docs]
  - title: '🔧 Maintenance'
    labels: [chore, dependencies, ci]
  - title: '⚠️ Breaking Changes'
    labels: [breaking]

exclude-labels:
  - skip-changelog
  - duplicate
  - invalid
  - wontfix

version-resolver:
  labels:
    - breaking
  default: patch

autolabeler:
  - label: documentation
    files:
      - '**/*.md'
      - docs/**
  - label: ci
    files:
      - .github/**

template: |
  ## Install

  ```bash
  # Debian/Ubuntu
  curl -fsSL https://carvalhosauro.github.io/local-ticker-wallet/install-apt.sh | sudo sh

  # Linux/macOS (no root)
  curl -LsSf https://github.com/carvalhosauro/local-ticker-wallet/releases/download/v$RESOLVED_VERSION/ltw-installer.sh | sh

  # Homebrew
  brew install carvalhosauro/tap/ltw

  # Rust
  cargo install ltw --version $RESOLVED_VERSION
  ```

  **Full changelog:** [CHANGELOG.md](https://github.com/carvalhosauro/local-ticker-wallet/blob/main/CHANGELOG.md)

  $CHANGES
